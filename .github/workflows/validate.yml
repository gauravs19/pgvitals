name: Validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  structure:
    name: Repository structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check all sql/ files have required header
        run: |
          FAILED=0
          for f in sql/[0-9]*.sql; do
            if ! grep -q -e "-- What" "$f"; then
              echo "MISSING header in $f"
              FAILED=1
            fi
            if ! grep -q -e "-- Look for" "$f"; then
              echo "MISSING 'Look for' in $f"
              FAILED=1
            fi
            if ! grep -q -e "-- Action" "$f"; then
              echo "MISSING 'Action' in $f"
              FAILED=1
            fi
          done
          if [ $FAILED -ne 0 ]; then exit 1; fi
          echo "All section headers OK"

      - name: Check no DML/DDL in sql/ sections
        run: |
          FAILED=0
          for f in sql/[0-9]*.sql; do
            # Allow only SELECT, WITH, comments, and whitespace
            if grep -iE "^\s*(INSERT|UPDATE|DELETE|DROP|CREATE|ALTER|TRUNCATE|GRANT|REVOKE)" "$f"; then
              echo "DML/DDL found in $f — sql/ files must be read-only"
              FAILED=1
            fi
          done
          if [ $FAILED -ne 0 ]; then exit 1; fi
          echo "No DML/DDL in sql/ — OK"

      - name: Count sections match docs
        run: |
          SQL_COUNT=$(ls sql/[0-9]*.sql | wc -l)
          MAX_NUM=$(ls sql/[0-9]*.sql | grep -oE '^sql/([0-9]+)' | sort -t/ -k2 -n | tail -1 | tr -d 'sql/')
          EXPECTED=$((MAX_NUM + 1))
          echo "Section files: $SQL_COUNT (00 through ${MAX_NUM})"
          if [ "$SQL_COUNT" -ne "$EXPECTED" ]; then
            echo "Gap detected: expected $EXPECTED files for range 00-${MAX_NUM}, found $SQL_COUNT"
            echo "Check for missing or duplicate section numbers"
            exit 1
          fi
          echo "Section count OK: $SQL_COUNT contiguous files"

  syntax:
    name: SQL syntax check (PostgreSQL 16)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: pgvitals
          POSTGRES_DB: pgvitals_test
          POSTGRES_INITDB_ARGS: "--data-checksums"
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          -e POSTGRES_HOST_AUTH_METHOD=trust
          --shm-size=256mb
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Configure pg_stat_statements
        env:
          PGPASSWORD: pgvitals
        run: |
          psql -h localhost -U postgres -d pgvitals_test \
            -c "ALTER SYSTEM SET shared_preload_libraries = 'pg_stat_statements';"
          docker restart $(docker ps -q --filter ancestor=postgres:16)
          for i in {1..10}; do
            if pg_isready -h localhost -U postgres; then
              break
            fi
            sleep 1
          done
          psql -h localhost -U postgres -d pgvitals_test \
            -c "CREATE EXTENSION IF NOT EXISTS pg_stat_statements;"

      - name: Syntax-check all sql/ sections
        env:
          PGPASSWORD: pgvitals
        run: |
          FAILED=0
          for f in sql/[0-9]*.sql; do
            if ! psql -h localhost -U postgres -d pgvitals_test \
                 --set ON_ERROR_STOP=on \
                 -c "\set QUIET on" \
                 -f "$f" > /dev/null 2>&1; then
              echo "::error file=$f::Parse error in $f"
              psql -h localhost -U postgres -d pgvitals_test -f "$f" 2>&1 | tail -5
              FAILED=1
            else
              echo "OK: $f"
            fi
          done
          if [ $FAILED -ne 0 ]; then exit 1; fi

      - name: Validate monitoring schema
        env:
          PGPASSWORD: pgvitals
        run: |
          echo "--- Loading monitoring schema ---"
          psql -h localhost -U postgres -d pgvitals_test \
            --set ON_ERROR_STOP=on \
            -f monitoring/schema.sql
          echo "--- Loading capture_snapshot function ---"
          psql -h localhost -U postgres -d pgvitals_test \
            --set ON_ERROR_STOP=on \
            -f monitoring/capture_snapshot.sql
          echo "--- Validating trend queries parse ---"
          psql -h localhost -U postgres -d pgvitals_test \
            --set ON_ERROR_STOP=on \
            -c "\set snap_a 1" -c "\set snap_b 2" \
            -f monitoring/trend_queries.sql > /dev/null 2>&1
          echo "Monitoring framework: OK"

      - name: Syntax-check health_score.sql
        env:
          PGPASSWORD: pgvitals
        run: |
          echo "--- Checking health_score.sql ---"
          # Run with -f; psql meta-commands (\pset) are harmless to re-execute
          psql -h localhost -U postgres -d pgvitals_test \
            --set ON_ERROR_STOP=on \
            -f health_score.sql
          echo "health_score.sql: OK"

  package:
    name: pip package smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and install package
        run: |
          pip install build
          python -m build --wheel
          pip install dist/*.whl

      - name: Verify package installs correctly
        run: |
          # Package import and version string
          python -c "import pgvitals; print('pgvitals', pgvitals.__version__)"

          # Entry point is wired up and help exits 0
          pgvitals --help
          pgvitals --version

          echo "Smoke test passed"
